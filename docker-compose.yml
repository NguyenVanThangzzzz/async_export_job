services:
  # ── Infrastructure ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: async_export
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d async_export']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Migrations (runs once, then exits) ────────────────────────────────────────
  # Uses the builder stage which has prisma CLI (devDep), so the lean production
  # images stay small while migrations still run inside a container.
  migrate:
    build:
      context: .
      target: builder
    command: npx prisma migrate deploy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/async_export
    depends_on:
      postgres:
        condition: service_healthy

  # ── HTTP Server ───────────────────────────────────────────────────────────────
  server:
    build: .
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/async_export
      REDIS_URL: redis://redis:6379
      MOCK_USER_ID: mock-user-001
    volumes:
      - exports_data:/app/exports
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  # ── Export Worker ─────────────────────────────────────────────────────────────
  worker-export:
    build: .
    command: node dist/workers/export.worker.js
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/async_export
      REDIS_URL: redis://redis:6379
    volumes:
      - exports_data:/app/exports
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  # ── Email Worker ──────────────────────────────────────────────────────────────
  worker-email:
    build: .
    command: node dist/workers/email.worker.js
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/async_export
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  # ── Queue Event Listener ──────────────────────────────────────────────────────
  queue-event:
    build: .
    command: node dist/events/export.queue-event.js
    restart: unless-stopped
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  exports_data:
